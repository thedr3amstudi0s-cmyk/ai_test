<!DOCTYPE html>
<html>
<head>
  <title>Learning AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Learning AI Chat</h2>

<div id="chat"></div>

<input id="msg" placeholder="Say something...">
<button id="sendBtn">Send</button>

<script type="module">
import { learnFact, getAnswer } from './firebase.js';

function add(text){
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML += "<p>"+text+"</p>";
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

// Event listener fixes the "send is not defined" issue
document.getElementById("sendBtn").addEventListener("click", send);

async function send() {
    const message = document.getElementById("msg").value.trim();
    if (!message) return;

    add("<b>You:</b> "+message);

    if(message.toLowerCase().startsWith("learn:")){
        const fact = message.replace(/learn:/i,"").trim();
        await learnFact(fact);
        add("<b>AI:</b> I learned that!");
    } else {
        const answer = await getAnswer(message);
        add("<b>AI:</b> "+answer);
    }

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
