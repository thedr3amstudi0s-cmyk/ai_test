<!DOCTYPE html>
<html>
<head>
  <title>Conversational AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Conversational AI Chat</h2>

<div id="chat"></div>

<input id="msg" placeholder="Say something...">
<button id="sendBtn">Send</button>

<script type="module">
import { storeMessage, getConversation, learnFact, getMemoryFacts } from './firebase.js';

function add(text){
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML += "<p>"+text+"</p>";
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

document.getElementById("sendBtn").addEventListener("click", send);

async function send() {
    const message = document.getElementById("msg").value.trim();
    if (!message) return;

    add("<b>You:</b> "+message);

    // Store user message
    await storeMessage("user", message);

    // Check if teaching
    if(message.toLowerCase().startsWith("learn:")){
        const fact = message.replace(/learn:/i,"").trim();
        await learnFact(fact);
        add("<b>AI:</b> I learned that!");
    } else {
        // Get conversation history
        const history = await getConversation();

        // Get memory facts
        const memory = await getMemoryFacts();

        // Simple AI response
        let reply = generateReply(message, history, memory);

        // Store AI message
        await storeMessage("ai", reply);

        add("<b>AI:</b> "+reply);
    }

    document.getElementById("msg").value = "";
}

// Simple dynamic reply generator
function generateReply(message, history, memory){
    message = message.toLowerCase();

    // Check memory facts for keywords
    for(const fact of memory){
        for(const k of fact.keywords){
            if(message.includes(k)){
                return fact.text;
            }
        }
    }

    // Check if greeting
    const greetings = ["hi","hello","hey","sup"];
    for(const g of greetings){
        if(message.includes(g)) return "Hello! How are you?";
    }

    // Check for previous user messages
    if(history.length>1){
        const lastUser = history.reverse().find(m=>m.role==="user");
        if(lastUser && lastUser.content !== message){
            return `Earlier you said: "${lastUser.content}". Interesting!`;
        }
    }

    // Default fallback
    return "Hmm... tell me more!";
}
</script>

</body>
</html>
